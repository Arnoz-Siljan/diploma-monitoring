groups:
  - name: system_alerts
    interval: 30s
    rules:
      - alert: HighCpuUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Visoka uporaba CPU ({{ $labels.instance }})"
          description: "CPU uporaba je nad 80% za 2 minuti. Trenutna vrednost: {{ $value | printf \"%.1f\" }}%."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Visoka uporaba pomnilnika ({{ $labels.instance }})"
          description: "RAM uporaba je nad 85% za 2 minuti. Trenutna vrednost: {{ $value | printf \"%.1f\" }}%."

      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{mountpoint="/rootfs"} / node_filesystem_size_bytes{mountpoint="/rootfs"}) * 100 < 15
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Malo prostora na disku ({{ $labels.instance }})"
          description: "Prosti prostor na disku je pod 15%. Trenutna vrednost: {{ $value | printf \"%.1f\" }}%."

      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Tarča je nedostopna ({{ $labels.instance }})"
          description: "Prometheus tarča {{ $labels.job }} na {{ $labels.instance }} se ne odziva že 1 minuto."

  - name: application_alerts
    interval: 30s
    rules:
      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="sonus-ventis"}[2m])) by (page, le)) > 0.5
        for: 1m
        labels:
          severity: warning
          team: application
        annotations:
          summary: "Visoka latenca za stran {{ $labels.page }}"
          description: "p95 odzivni čas za {{ $labels.page }} je nad 500ms za 1 minuto. Trenutna vrednost: {{ $value | printf \"%.3f\" }}s."

      - alert: HighErrorRate
        expr: sum(rate(http_requests_received_total{job="sonus-ventis",code=~"5.."}[2m])) / sum(rate(http_requests_received_total{job="sonus-ventis"}[2m])) > 0.05
        for: 2m
        labels:
          severity: critical
          team: application
        annotations:
          summary: "Visok delež napak (5xx) v aplikaciji"
          description: "Več kot 5% zahtev se konča z napako 5xx za 2 minuti. Trenutna vrednost: {{ $value | humanizePercentage }}."

      - alert: ApplicationDown
        expr: up{job="sonus-ventis"} == 0
        for: 1m
        labels:
          severity: critical
          team: application
        annotations:
          summary: "Sonus Ventis aplikacija ne odgovarja"
          description: "Prometheus ne more scrape-ati metrik iz Sonus Ventis aplikacije že 1 minuto."
